<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <header class="site-header">
      <div class="header-inner">
        <h1 class="logo">💰 Budget Visualizer</h1>
        <p class="tagline">Track your spending, stay on budget.</p>
      </div>
    </header>

    <!-- ===== MAIN LAYOUT ===== -->
    <main class="container">

      <!-- ---- Balance Card ---- -->
      <section class="balance-card" aria-label="Total Balance">
        <p class="balance-label">Total Balance</p>
        <h2 class="balance-amount" id="totalBalance">Rp 0</h2>
      </section>

      <!-- ---- Two-column grid ---- -->
      <div class="grid">

        <!-- LEFT: Form + Transaction List -->
        <div class="left-panel">

          <!-- Add Transaction Form -->
          <section class="card" aria-labelledby="formTitle">
            <h3 class="card-title" id="formTitle">Add Transaction</h3>
            <form id="transactionForm" novalidate>

              <div class="form-group">
                <label for="itemName">Item Name</label>
                <input
                  type="text"
                  id="itemName"
                  placeholder="e.g. Lunch, Grab, Netflix"
                  autocomplete="off"
                />
                <span class="error-msg" id="itemNameError"></span>
              </div>

              <div class="form-group">
                <label for="amount">Amount (Rp)</label>
                <input
                  type="number"
                  id="amount"
                  placeholder="e.g. 25000"
                  min="1"
                />
                <span class="error-msg" id="amountError"></span>
              </div>

              <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                  <option value="">-- Select Category --</option>
                  <option value="Food">🍔 Food</option>
                  <option value="Transport">🚗 Transport</option>
                  <option value="Fun">🎉 Fun</option>
                </select>
                <span class="error-msg" id="categoryError"></span>
              </div>

              <button type="submit" class="btn-primary">+ Add Transaction</button>
            </form>
          </section>

          <!-- Transaction List -->
          <section class="card" aria-labelledby="listTitle">
            <div class="list-header">
              <h3 class="card-title" id="listTitle">Transactions</h3>
              <span class="tx-count" id="txCount">0 items</span>
            </div>

            <div class="transaction-list" id="transactionList" role="list">
              <!-- populated by JS -->
              <p class="empty-state" id="emptyState">No transactions yet. Add one above!</p>
            </div>
          </section>

        </div><!-- /left-panel -->

        <!-- RIGHT: Chart -->
        <div class="right-panel">
          <section class="card chart-card" aria-labelledby="chartTitle">
            <h3 class="card-title" id="chartTitle">Spending by Category</h3>
            <div class="chart-wrapper">
              <canvas id="spendingChart" aria-label="Pie chart of spending by category"></canvas>
            </div>
            <p class="chart-empty" id="chartEmpty">Add transactions to see the chart.</p>
          </section>

          <!-- Category Summary -->
          <section class="card summary-card" aria-labelledby="summaryTitle">
            <h3 class="card-title" id="summaryTitle">Category Summary</h3>
            <ul class="summary-list" id="summaryList" role="list">
              <!-- populated by JS -->
            </ul>
          </section>
        </div><!-- /right-panel -->

      </div><!-- /grid -->
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <p>Built with ❤️ by Vincent.S · Data stored locally in your browser.</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
